<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <g stroke="#2C3560" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- Top rail (rectangle, slightly 3D perspective) -->
    <path d="M36 64 L164 64 L152 52 L48 52 Z" stroke-width="2"/>
    <!-- Four corner posts -->
    <line x1="48" y1="52" x2="48" y2="162" stroke-width="2.2"/>
    <line x1="152" y1="52" x2="152" y2="162" stroke-width="2.2"/>
    <line x1="36" y1="64" x2="36" y2="170" stroke-width="2.2"/>
    <line x1="164" y1="64" x2="164" y2="170" stroke-width="2.2"/>
    <!-- Bottom base -->
    <path d="M36 170 L164 170 L152 162 L48 162 Z" stroke-width="2"/>
    <!-- Mesh side front -->
    <rect x="36" y="64" width="128" height="106" stroke-width="1.6"/>
    <!-- Mesh pattern vertical lines (front) -->
    <line x1="52" y1="64" x2="52" y2="170" stroke-width="1"/>
    <line x1="72" y1="64" x2="72" y2="170" stroke-width="1"/>
    <line x1="92" y1="64" x2="92" y2="170" stroke-width="1"/>
    <line x1="112" y1="64" x2="112" y2="170" stroke-width="1"/>
    <line x1="132" y1="64" x2="132" y2="170" stroke-width="1"/>
    <line x1="148" y1="64" x2="148" y2="170" stroke-width="1"/>
    <!-- Mesh pattern horizontal lines (front) -->
    <line x1="36" y1="84" x2="164" y2="84" stroke-width="1"/>
    <line x1="36" y1="104" x2="164" y2="104" stroke-width="1"/>
    <line x1="36" y1="124" x2="164" y2="124" stroke-width="1"/>
    <line x1="36" y1="144" x2="164" y2="144" stroke-width="1"/>
    <!-- Mattress pad -->
    <path d="M38 162 Q100 156 162 162" stroke-width="1.5"/>
    <!-- Side top edge -->
    <line x1="48" y1="52" x2="36" y2="64" stroke-width="1.8"/>
    <line x1="152" y1="52" x2="164" y2="64" stroke-width="1.8"/>
    <!-- Side mesh lines angled -->
    <line x1="48" y1="84" x2="36" y2="84" stroke-width="0.8"/>
    <line x1="48" y1="104" x2="36" y2="104" stroke-width="0.8"/>
    <line x1="48" y1="124" x2="36" y2="124" stroke-width="0.8"/>
    <line x1="48" y1="144" x2="36" y2="144" stroke-width="0.8"/>
  </g>
</svg>
