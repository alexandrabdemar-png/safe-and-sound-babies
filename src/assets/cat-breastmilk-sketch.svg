<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <g stroke="#2C3560" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- Storage bag main body -->
    <path d="M60 72 L60 160 C60 170 76 176 100 176 C124 176 140 170 140 160 L140 72 Z" stroke-width="2.2"/>
    <!-- Bag gusset bottom -->
    <path d="M60 160 C60 160 76 164 100 164 C124 164 140 160 140 160" stroke-width="1.4"/>
    <!-- Zip lock seal top -->
    <rect x="58" y="58" width="84" height="16" rx="5" stroke-width="2"/>
    <!-- Zip track line 1 -->
    <path d="M60 64 L140 64" stroke-width="2.4" stroke-linecap="round"/>
    <!-- Zip track line 2 -->
    <path d="M60 70 L140 70" stroke-width="1.6" stroke-linecap="round"/>
    <!-- Zip slider tab -->
    <rect x="96" y="56" width="8" height="20" rx="3" stroke-width="1.6"/>
    <!-- Hanging hole notch -->
    <circle cx="100" cy="52" r="6" stroke-width="1.8"/>
    <!-- Milk fill level -->
    <path d="M62 134 C72 128 88 126 100 127 C112 126 128 128 138 134" stroke-width="1.6"/>
    <!-- Milk surface ripple -->
    <path d="M68 132 C80 129 90 128 100 129 C110 128 120 129 132 132" stroke-width="1.1"/>
    <!-- Label area -->
    <rect x="66" y="80" width="68" height="46" rx="6" stroke-width="1.6"/>
    <!-- Heart on label -->
    <path d="M100 90 C100 86 104 84 108 86 C112 88 112 94 108 98 C104 102 100 104 100 104 C100 104 96 102 92 98 C88 94 88 88 92 86 C96 84 100 86 100 90 Z" stroke-width="1.6"/>
    <!-- Date/name lines -->
    <line x1="70" y1="114" x2="96" y2="114" stroke-width="1.2"/>
    <line x1="70" y1="120" x2="90" y2="120" stroke-width="1.2"/>
    <!-- Milk drop shapes in fill area -->
    <path d="M82 148 C82 142 86 138 88 140 C90 142 90 150 86 154 C82 152 80 150 82 148 Z" stroke-width="1.4"/>
    <path d="M110 150 C110 144 113 140 115 142 C117 144 117 152 113 156 C109 154 108 152 110 150 Z" stroke-width="1.4"/>
    <!-- Bag left edge shine -->
    <path d="M64 80 C63 96 62 112 62 128" stroke-width="1.1"/>
  </g>
</svg>
