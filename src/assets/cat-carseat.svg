  <rect x="25" y="75" width="50" height="4" rx="1.5" fill="#A0723A"/>

  <!-- Handle bar arc -->
  <path d="M32 72 Q32 45 50 42 Q68 45 68 72" stroke="#8B5E3C" stroke-width="4" stroke-linecap="round" fill="none"/>

  <!-- Seat shell outer -->
