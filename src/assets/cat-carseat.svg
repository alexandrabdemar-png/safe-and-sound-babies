  <!-- Cushion quilt lines -->
  <path d="M34 55 Q50 51 66 55" stroke="#D4C9B5" stroke-width="0.7"/>
  <path d="M33 62 Q50 58 67 62" stroke="#D4C9B5" stroke-width="0.7"/>
  <path d="M34 68 Q50 65 66 68" stroke="#D4C9B5" stroke-width="0.7"/>
  <path d="M43 38 Q42 60 43 70" stroke="#D4C9B5" stroke-width="0.6" stroke-linecap="round"/>
  <path d="M50 36 L50 70" stroke="#D4C9B5" stroke-width="0.6" stroke-linecap="round"/>
  <path d="M57 38 Q58 60 57 70" stroke="#D4C9B5" stroke-width="0.6" stroke-linecap="round"/>

  <!-- Head cushion -->
  <path d="M38 42 Q50 36 62 42 Q60 35 50 32 Q40 35 38 42Z" fill="#EDE5D5" stroke="#D4C9B5" stroke-width="0.8"/>

