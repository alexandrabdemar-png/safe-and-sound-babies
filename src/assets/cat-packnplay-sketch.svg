<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <g stroke="#2C3560" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- Four corner posts -->
    <line x1="40" y1="54" x2="40" y2="174" stroke-width="2.4"/>
    <line x1="160" y1="54" x2="160" y2="174" stroke-width="2.4"/>
    <!-- Top rail front -->
    <line x1="40" y1="54" x2="160" y2="54" stroke-width="2.4"/>
    <!-- Bottom rail front -->
    <line x1="40" y1="174" x2="160" y2="174" stroke-width="2.4"/>
    <!-- Top cap knobs on corners -->
    <circle cx="40" cy="50" r="5" stroke-width="1.8"/>
    <circle cx="160" cy="50" r="5" stroke-width="1.8"/>
    <!-- Mesh panel front - vertical lines -->
    <line x1="56" y1="54" x2="56" y2="174" stroke-width="1.1"/>
    <line x1="72" y1="54" x2="72" y2="174" stroke-width="1.1"/>
    <line x1="88" y1="54" x2="88" y2="174" stroke-width="1.1"/>
    <line x1="100" y1="54" x2="100" y2="174" stroke-width="1.1"/>
    <line x1="112" y1="54" x2="112" y2="174" stroke-width="1.1"/>
    <line x1="128" y1="54" x2="128" y2="174" stroke-width="1.1"/>
    <line x1="144" y1="54" x2="144" y2="174" stroke-width="1.1"/>
    <!-- Mesh panel front - horizontal lines -->
    <line x1="40" y1="74" x2="160" y2="74" stroke-width="1.1"/>
    <line x1="40" y1="94" x2="160" y2="94" stroke-width="1.1"/>
    <line x1="40" y1="114" x2="160" y2="114" stroke-width="1.1"/>
    <line x1="40" y1="134" x2="160" y2="134" stroke-width="1.1"/>
    <line x1="40" y1="154" x2="160" y2="154" stroke-width="1.1"/>
    <!-- Fold-down rail / side hinge -->
    <rect x="40" y="54" width="120" height="10" rx="3" stroke-width="1.8"/>
    <!-- Mattress -->
    <rect x="44" y="158" width="112" height="14" rx="4" stroke-width="1.6"/>
    <!-- Mattress detail -->
    <path d="M52 165 Q100 160 148 165" stroke-width="1.2"/>
    <!-- Feet -->
    <rect x="34" y="174" width="14" height="8" rx="3" stroke-width="1.6"/>
    <rect x="152" y="174" width="14" height="8" rx="3" stroke-width="1.6"/>
    <!-- Carry handle on top -->
    <path d="M84 54 C84 44 116 44 116 54" stroke-width="1.8"/>
  </g>
</svg>
