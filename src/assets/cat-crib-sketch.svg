<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <g stroke="#2C3560" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- Mobile vertical pole -->
    <line x1="100" y1="22" x2="100" y2="48" stroke-width="2"/>
    <!-- Mobile horizontal arm -->
    <line x1="66" y1="40" x2="134" y2="40" stroke-width="2"/>
    <!-- Small knob on top -->
    <circle cx="100" cy="20" r="4" stroke-width="1.8"/>
    <!-- Mobile string 1 - left cloud -->
    <line x1="74" y1="40" x2="74" y2="56" stroke-width="1.4"/>
    <!-- Cloud left -->
    <path d="M65 60 C65 56 68 54 72 55 C72 52 75 50 78 51 C81 50 84 52 84 55 C87 54 90 56 90 60 C90 64 87 66 83 66 L69 66 C65 66 62 63 62 60Z" stroke-width="1.5"/>
    <!-- Mobile string 2 - star centre -->
    <line x1="100" y1="40" x2="100" y2="52" stroke-width="1.4"/>
    <!-- Star -->
    <path d="M100 52 L102 60 L110 60 L104 65 L107 73 L100 68 L93 73 L96 65 L90 60 L98 60 Z" stroke-width="1.4"/>
    <!-- Mobile string 3 - right cloud -->
    <line x1="126" y1="40" x2="126" y2="56" stroke-width="1.4"/>
    <!-- Cloud right (smaller) -->
    <path d="M116 60 C116 56 119 54 123 55 C123 52 126 50 129 51 C132 50 135 52 135 55 C138 54 141 56 141 60 C141 64 138 66 134 66 L120 66 C116 66 113 63 113 60Z" stroke-width="1.5"/>
    <!-- Outer crib oval -->
    <ellipse cx="100" cy="138" rx="72" ry="44" stroke-width="2.4"/>
    <!-- Inner oval (top rim) -->
    <path d="M40 128 C40 118 68 110 100 110 C132 110 160 118 160 128" stroke-width="1.8"/>
    <!-- Vertical slats -->
    <line x1="60" y1="97" x2="57" y2="176" stroke-width="1.4"/>
    <line x1="74" y1="94" x2="72" y2="178" stroke-width="1.4"/>
    <line x1="88" y1="92" x2="87" y2="180" stroke-width="1.4"/>
    <line x1="100" y1="92" x2="100" y2="180" stroke-width="1.4"/>
    <line x1="112" y1="92" x2="113" y2="180" stroke-width="1.4"/>
    <line x1="126" y1="94" x2="128" y2="178" stroke-width="1.4"/>
    <line x1="140" y1="97" x2="143" y2="176" stroke-width="1.4"/>
    <!-- Mattress chevron pattern -->
    <path d="M66 136 L74 128 L82 136 L90 128 L98 136 L106 128 L114 136 L122 128 L130 136" stroke-width="1.2"/>
    <!-- Legs -->
    <line x1="46" y1="170" x2="38" y2="190" stroke-width="2.2"/>
    <line x1="154" y1="170" x2="162" y2="190" stroke-width="2.2"/>
    <!-- Leg crossbar -->
    <line x1="40" y1="185" x2="160" y2="185" stroke-width="1.6"/>
  </g>
</svg>
