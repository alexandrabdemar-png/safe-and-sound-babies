<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <g stroke="#2C3560" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- Can body -->
    <rect x="54" y="84" width="92" height="92" rx="8" stroke-width="2.2"/>
    <!-- Can top ellipse -->
    <ellipse cx="100" cy="84" rx="46" ry="12" stroke-width="2.2"/>
    <!-- Lid rim -->
    <ellipse cx="100" cy="70" rx="42" ry="10" stroke-width="2"/>
    <!-- Lid top surface -->
    <ellipse cx="100" cy="66" rx="38" ry="8" stroke-width="1.6"/>
    <!-- Pull tab ring -->
    <path d="M100 58 C102 50 108 46 114 48 C120 50 120 58 116 62 L108 64" stroke-width="1.8"/>
    <!-- Tab oval -->
    <ellipse cx="112" cy="52" rx="8" ry="5" transform="rotate(-20 112 52)" stroke-width="1.6"/>
    <!-- Scoop on lid -->
    <path d="M76 64 C78 58 84 56 88 60 C84 65 78 68 76 64 Z" stroke-width="1.4"/>
    <!-- Scoop handle -->
    <path d="M78 63 C72 68 68 76 70 80" stroke-width="1.4"/>
    <!-- Label band wrap -->
    <rect x="58" y="92" width="84" height="76" rx="4" stroke-width="1.6"/>
    <!-- Brand name line top -->
    <line x1="66" y1="104" x2="134" y2="104" stroke-width="2.4"/>
    <!-- Subtitle line -->
    <line x1="72" y1="112" x2="128" y2="112" stroke-width="1.4"/>
    <!-- Baby bottle icon on label -->
    <path d="M88 124 C88 120 93 118 100 118 C107 118 112 120 112 124 L110 152 C110 156 106 158 100 158 C94 158 90 156 90 152 Z" stroke-width="1.6"/>
    <!-- Bottle nipple -->
    <path d="M93 118 C94 112 100 109 100 109 C100 109 106 112 107 118" stroke-width="1.4"/>
    <!-- Bottle measurement lines -->
    <line x1="112" y1="130" x2="116" y2="130" stroke-width="1.1"/>
    <line x1="112" y1="138" x2="116" y2="138" stroke-width="1.1"/>
    <line x1="112" y1="146" x2="116" y2="146" stroke-width="1.1"/>
    <!-- Label bottom serving lines -->
    <line x1="62" y1="156" x2="80" y2="156" stroke-width="1.2"/>
    <line x1="62" y1="162" x2="84" y2="162" stroke-width="1.2"/>
    <!-- Can body shine -->
    <path d="M58 92 C57 110 56 128 56 146" stroke-width="1.1"/>
  </g>
