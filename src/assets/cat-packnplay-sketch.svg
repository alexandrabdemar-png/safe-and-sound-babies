<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" stroke="#2C3560" fill="none" stroke-linecap="round" stroke-linejoin="round">
  <!-- Four corner posts -->
  <line x1="38" y1="50" x2="38" y2="178" stroke-width="2.6"/>
  <line x1="162" y1="50" x2="162" y2="178" stroke-width="2.6"/>
  <!-- Corner post caps -->
  <circle cx="38" cy="46" r="5.5" stroke-width="1.8"/>
  <circle cx="162" cy="46" r="5.5" stroke-width="1.8"/>

  <!-- Top rail front -->
  <line x1="38" y1="50" x2="162" y2="50" stroke-width="2.4"/>
  <!-- Top rail fold hinge strip -->
  <rect x="38" y="50" width="124" height="10" rx="3" stroke-width="1.8"/>

  <!-- Carry handle arching up from top centre -->
  <path d="M 82 50 C 82 36 118 36 118 50" stroke-width="2.2"/>
  <!-- Carry handle grip wrap -->
  <line x1="98" y1="34" x2="98" y2="40" stroke-width="1.2"/>
  <line x1="102" y1="33" x2="102" y2="39" stroke-width="1.2"/>

  <!-- Bottom rail front -->
  <line x1="38" y1="178" x2="162" y2="178" stroke-width="2.4"/>

  <!-- Mesh grid vertical lines front panel -->
  <line x1="54" y1="60" x2="54" y2="172" stroke-width="1.1"/>
  <line x1="70" y1="60" x2="70" y2="172" stroke-width="1.1"/>
  <line x1="86" y1="60" x2="86" y2="172" stroke-width="1.1"/>
  <line x1="100" y1="60" x2="100" y2="172" stroke-width="1.1"/>
  <line x1="114" y1="60" x2="114" y2="172" stroke-width="1.1"/>
  <line x1="130" y1="60" x2="130" y2="172" stroke-width="1.1"/>
  <line x1="146" y1="60" x2="146" y2="172" stroke-width="1.1"/>

  <!-- Mesh grid horizontal lines front panel -->
  <line x1="38" y1="76" x2="162" y2="76" stroke-width="1.1"/>
  <line x1="38" y1="92" x2="162" y2="92" stroke-width="1.1"/>
  <line x1="38" y1="108" x2="162" y2="108" stroke-width="1.1"/>
  <line x1="38" y1="124" x2="162" y2="124" stroke-width="1.1"/>
  <line x1="38" y1="140" x2="162" y2="140" stroke-width="1.1"/>
  <line x1="38" y1="156" x2="162" y2="156" stroke-width="1.1"/>

  <!-- Mid-height fold rail / changing table ledge -->
  <rect x="36" y="108" width="128" height="8" rx="2" stroke-width="1.6"/>

  <!-- Mattress pad inside at base -->
  <rect x="42" y="166" width="116" height="14" rx="5" stroke-width="1.8"/>
  <!-- Mattress pad surface detail -->
  <path d="M 50 173 Q 100 168 150 173" stroke-width="1.2"/>
  <!-- Mattress corner buttons -->
  <circle cx="50" cy="170" r="2.5" stroke-width="1.3"/>
  <circle cx="150" cy="170" r="2.5" stroke-width="1.3"/>

  <!-- Foot pads at each corner -->
  <rect x="30" y="178" width="16" height="8" rx="3" stroke-width="1.6"/>
  <rect x="154" y="178" width="16" height="8" rx="3" stroke-width="1.6"/>
</svg>
