<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <!-- Rocker base - two curved runners -->
  <path d="M10 88 Q30 96 50 94 Q70 96 90 88" stroke="#7A4E2D" stroke-width="3.5" stroke-linecap="round" fill="none"/>

  <!-- Left side frame - sweeping bentwood curve -->
  <path d="M18 87 Q16 72 22 58 Q26 46 32 38 Q38 30 42 26" stroke="#7A4E2D" stroke-width="3" stroke-linecap="round" fill="none"/>
  <!-- Right side frame -->
  <path d="M82 87 Q84 72 78 58 Q74 46 68 38 Q62 30 58 26" stroke="#7A4E2D" stroke-width="3" stroke-linecap="round" fill="none"/>

  <!-- Seat base / reclined shell -->
  <path d="M22 78 Q50 82 78 78 Q76 60 68 48 Q58 36 50 34 Q42 36 32 48 Q24 60 22 78Z" fill="#C8A97A" stroke="#7A4E2D" stroke-width="1.5"/>

  <!-- Cream quilted seat pad -->
  <path d="M25 77 Q50 81 75 77 Q73 62 66 51 Q58 41 50 39 Q42 41 34 51 Q27 62 25 77Z" fill="#F0EBE0" stroke="#DDD5C5" stroke-width="0.8"/>

  <!-- Quilt horizontal lines -->
  <path d="M28 70 Q50 74 72 70" stroke="#C8C0B0" stroke-width="0.7" stroke-linecap="round"/>
  <path d="M30 63 Q50 67 70 63" stroke="#C8C0B0" stroke-width="0.7" stroke-linecap="round"/>
  <path d="M32 56 Q50 60 68 56" stroke="#C8C0B0" stroke-width="0.7" stroke-linecap="round"/>
  <path d="M34 49 Q50 53 66 49" stroke="#C8C0B0" stroke-width="0.7" stroke-linecap="round"/>

  <!-- Quilt vertical lines -->
  <path d="M40 40 Q39 62 38 78" stroke="#C8C0B0" stroke-width="0.6" stroke-linecap="round"/>
  <path d="M50 39 L50 81" stroke="#C8C0B0" stroke-width="0.6" stroke-linecap="round"/>
  <path d="M60 40 Q61 62 62 78" stroke="#C8C0B0" stroke-width="0.6" stroke-linecap="round"/>

  <!-- Head pillow bump -->
  <path d="M40 40 Q50 36 60 40 Q58 33 50 31 Q42 33 40 40Z" fill="#EDE5D5" stroke="#C8C0B0" stroke-width="0.8"/>

  <!-- Toy arch - tall elegant arc -->
  <path d="M34 44 Q30 18 50 12 Q70 18 66 44" stroke="#7A4E2D" stroke-width="3" stroke-linecap="round" fill="none"/>

  <!-- Hanging string - cloud -->
  <line x1="44" y1="14" x2="44" y2="22" stroke="#A07850" stroke-width="1"/>
  <!-- Cloud shape -->
  <ellipse cx="44" cy="24.5" rx="3.5" ry="2" fill="#EDE5D5" stroke="#C8A97A" stroke-width="0.8"/>
  <ellipse cx="41.5" cy="25.5" rx="2" ry="1.5" fill="#EDE5D5" stroke="#C8A97A" stroke-width="0.8"/>
  <ellipse cx="46.5" cy="25.5" rx="2" ry="1.5" fill="#EDE5D5" stroke="#C8A97A" stroke-width="0.8"/>
  <rect x="41" y="25.5" width="6" height="2" fill="#EDE5D5"/>

  <!-- Hanging string - ring -->
  <line x1="50" y1="14" x2="50" y2="22" stroke="#A07850" stroke-width="1"/>
  <circle cx="50" cy="25.5" r="3" stroke="#7A4E2D" stroke-width="1.8" fill="none"/>

  <!-- Hanging string - beads -->
  <line x1="56" y1="14" x2="56" y2="20" stroke="#A07850" stroke-width="1"/>
  <circle cx="56" cy="22" r="2" fill="#C8A97A"/>
  <circle cx="56" cy="26.5" r="1.8" fill="#A07850"/>
  <circle cx="56" cy="30.5" r="1.6" fill="#C8A97A"/>
</svg>
