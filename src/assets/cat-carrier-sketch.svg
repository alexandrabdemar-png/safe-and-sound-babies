<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" stroke="#2C3560" fill="none" stroke-linecap="round" stroke-linejoin="round">
  <!-- Left shoulder strap outer edge -->
  <path d="M 68 80 C 64 64 56 50 42 36" stroke-width="2.4"/>
  <!-- Left shoulder strap inner edge -->
  <path d="M 80 80 C 74 66 68 52 58 40" stroke-width="2.2"/>
  <!-- Left strap top loop -->
  <path d="M 42 36 C 36 30 32 28 30 32 C 28 36 32 44 42 50 L 58 40" stroke-width="2.2"/>
  <!-- Left strap padding cross marks -->
  <line x1="50" y1="44" x2="55" y2="49" stroke-width="1.1"/>
  <line x1="58" y1="56" x2="62" y2="62" stroke-width="1.1"/>
  <line x1="64" y1="68" x2="68" y2="74" stroke-width="1.1"/>

  <!-- Right shoulder strap outer edge -->
  <path d="M 132 80 C 136 64 144 50 158 36" stroke-width="2.4"/>
  <!-- Right shoulder strap inner edge -->
  <path d="M 120 80 C 126 66 132 52 142 40" stroke-width="2.2"/>
  <!-- Right strap top loop -->
  <path d="M 158 36 C 164 30 168 28 170 32 C 172 36 168 44 158 50 L 142 40" stroke-width="2.2"/>
  <!-- Right strap padding cross marks -->
  <line x1="150" y1="44" x2="145" y2="49" stroke-width="1.1"/>
  <line x1="142" y1="56" x2="138" y2="62" stroke-width="1.1"/>
  <line x1="136" y1="68" x2="132" y2="74" stroke-width="1.1"/>

  <!-- Chest strap horizontal bar -->
  <rect x="72" y="54" width="56" height="12" rx="5" stroke-width="1.8"/>
  <!-- Chest buckle centre -->
  <rect x="88" y="55" width="24" height="10" rx="4" stroke-width="1.6"/>
  <line x1="100" y1="55" x2="100" y2="65" stroke-width="1.3"/>

  <!-- Head support flap at top -->
  <path d="M 80 20 C 80 14 88 10 100 10 C 112 10 120 14 120 20 L 120 32 C 118 38 108 42 100 42 C 92 42 82 38 80 32 Z" stroke-width="2"/>
  <!-- Head support padding stitch -->
  <path d="M 84 22 C 84 18 90 15 100 15 C 110 15 116 18 116 22" stroke-width="1.2" stroke-dasharray="4,3"/>

  <!-- Main body panel outer -->
  <path d="M 68 80 L 64 170 Q 64 180 100 180 Q 136 180 136 170 L 132 80 Z" stroke-width="2.4"/>
  <!-- Main body panel centre seam -->
  <line x1="100" y1="80" x2="100" y2="150" stroke-width="1.2" stroke-dasharray="5,4"/>
  <!-- Padding stitch lines left -->
  <path d="M 72 96 C 76 92 80 92 84 95" stroke-width="1.2"/>
  <path d="M 72 108 C 76 104 80 104 84 107" stroke-width="1.2"/>
  <!-- Padding stitch lines right -->
  <path d="M 116 96 C 120 92 124 92 128 95" stroke-width="1.2"/>
  <path d="M 116 108 C 120 104 124 104 128 107" stroke-width="1.2"/>

  <!-- Front kangaroo pocket -->
  <path d="M 76 130 C 74 120 78 112 100 110 C 122 112 126 120 124 130 L 124 162 Q 124 170 100 170 Q 76 170 76 162 Z" stroke-width="1.6"/>
  <!-- Pocket top stitching arc -->
  <path d="M 80 130 C 80 120 88 115 100 114 C 112 115 120 120 120 130" stroke-width="1.2"/>

  <!-- Waist belt -->
  <rect x="56" y="162" width="88" height="18" rx="9" stroke-width="2.2"/>
  <!-- Waist belt centre seam -->
  <path d="M 100 162 L 100 180" stroke-width="1.1"/>
  <!-- Left belt buckle -->
  <rect x="60" y="165" width="28" height="12" rx="5" stroke-width="1.6"/>
  <line x1="74" y1="165" x2="74" y2="177" stroke-width="1.3"/>
  <!-- Right belt buckle -->
  <rect x="112" y="165" width="28" height="12" rx="5" stroke-width="1.6"/>
  <line x1="126" y1="165" x2="126" y2="177" stroke-width="1.3"/>
  <!-- Adjuster sliders left side -->
  <rect x="64" y="138" width="10" height="18" rx="3" stroke-width="1.4"/>
  <!-- Adjuster sliders right side -->
  <rect x="126" y="138" width="10" height="18" rx="3" stroke-width="1.4"/>
</svg>
