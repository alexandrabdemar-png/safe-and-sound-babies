<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" stroke="#2C3560" fill="none" stroke-linecap="round" stroke-linejoin="round">
  <!-- Can body rectangle with rounded corners -->
  <rect x="46" y="88" width="108" height="98" rx="10" stroke-width="2.4"/>
  <!-- Can body bottom ellipse giving depth -->
  <path d="M 46 178 C 50 188 72 194 100 194 C 128 194 150 188 154 178" stroke-width="1.6"/>

  <!-- Can top ellipse rim -->
  <ellipse cx="100" cy="88" rx="54" ry="14" stroke-width="2.4"/>
  <!-- Lid raised platform ellipse -->
  <ellipse cx="100" cy="74" rx="48" ry="12" stroke-width="2.2"/>
  <!-- Lid surface top ellipse -->
  <ellipse cx="100" cy="68" rx="42" ry="9" stroke-width="1.6"/>
  <!-- Lid rim detail line -->
  <path d="M 52 82 Q 100 86 148 82" stroke-width="1.2"/>

  <!-- Pull-tab ring -->
  <path d="M 108 60 C 110 52 116 48 122 50 C 128 52 130 60 126 65 L 118 68" stroke-width="1.8"/>
  <!-- Pull tab oval/ring shape -->
  <ellipse cx="120" cy="54" rx="9" ry="6" transform="rotate(-15 120 54)" stroke-width="1.6"/>
  <!-- Tab rivets/indent -->
  <line x1="110" y1="64" x2="114" y2="66" stroke-width="1.3"/>

  <!-- Scoop spoon on lid -->
  <ellipse cx="76" cy="70" rx="12" ry="8" transform="rotate(-30 76 70)" stroke-width="1.5"/>
  <!-- Scoop bowl highlight -->
  <path d="M 70 67 C 72 64 76 63 79 65" stroke-width="1.1"/>
  <!-- Scoop handle -->
  <path d="M 82 75 C 78 82 72 90 68 96" stroke-width="1.5"/>
  <!-- Scoop handle end -->
  <path d="M 68 96 C 67 100 70 102 72 100" stroke-width="1.3"/>

  <!-- Label band wrap inner area -->
  <rect x="50" y="96" width="100" height="82" rx="6" stroke-width="1.6"/>

  <!-- Brand name top bold line 1 -->
  <line x1="60" y1="108" x2="140" y2="108" stroke-width="2.4"/>
  <!-- Brand name top bold line 2 -->
  <line x1="62" y1="116" x2="138" y2="116" stroke-width="1.6"/>
  <!-- Subtitle line -->
  <line x1="68" y1="124" x2="132" y2="124" stroke-width="1.2"/>

  <!-- Baby bottle icon on label centre -->
  <path d="M 84 136 C 84 130 90 126 100 126 C 110 126 116 130 116 136 L 114 158 C 114 163 108 166 100 166 C 92 166 86 163 86 158 Z" stroke-width="1.6"/>
  <!-- Bottle collar on label icon -->
  <rect x="88" y="120" width="24" height="8" rx="3" stroke-width="1.4"/>
  <!-- Bottle nipple on label icon -->
  <path d="M 92 120 C 93 114 100 111 100 111 C 100 111 107 114 108 120" stroke-width="1.3"/>
  <!-- Bottle measurement lines on icon -->
  <line x1="116" y1="136" x2="120" y2="136" stroke-width="1.1"/>
  <line x1="116" y1="144" x2="120" y2="144" stroke-width="1.1"/>
  <line x1="116" y1="152" x2="120" y2="152" stroke-width="1.1"/>

  <!-- Serving info lines at bottom of label -->
  <line x1="56" y1="160" x2="82" y2="160" stroke-width="1.2"/>
  <line x1="56" y1="166" x2="82" y2="166" stroke-width="1.2"/>
  <line x1="118" y1="160" x2="144" y2="160" stroke-width="1.2"/>
  <line x1="118" y1="166" x2="144" y2="166" stroke-width="1.2"/>

  <!-- Can body left side shine -->
  <path d="M 50 96 C 49 114 48 132 48 150" stroke-width="1.2"/>
  <path d="M 54 96 C 53 112 53 128 53 144" stroke-width="1.1"/>
</svg>
