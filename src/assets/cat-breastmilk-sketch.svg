<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <g stroke="#2C3560" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- Storage bag outline -->
    <path d="M62 70 L62 155 Q62 168 100 168 Q138 168 138 155 L138 70 Z" stroke-width="2"/>
    <!-- Bag shoulder / top seal area -->
    <rect x="62" y="58" width="76" height="14" rx="4" stroke-width="1.8"/>
    <!-- Zip lock lines -->
    <line x1="64" y1="64" x2="136" y2="64" stroke-width="3" stroke-linecap="round"/>
    <!-- Milk fill level line -->
    <path d="M64 128 Q100 122 136 128" stroke-width="1.6"/>
    <!-- Label box on bag -->
    <rect x="70" y="78" width="60" height="42" rx="5" stroke-width="1.4"/>
    <!-- Heart on label -->
    <path d="M100 88 Q100 84 104 84 Q108 84 108 88 Q108 94 100 99 Q92 94 92 88 Q92 84 96 84 Q100 84 100 88 Z" stroke-width="1.5"/>
    <!-- Date lines on label -->
    <line x1="74" y1="106" x2="96" y2="106" stroke-width="1.2"/>
    <line x1="74" y1="113" x2="90" y2="113" stroke-width="1.2"/>
    <!-- Milk droplets at bottom of bag -->
    <path d="M82 140 Q82 134 86 132 Q90 130 90 136 Q90 144 82 148 Q74 144 74 136 Q74 130 78 132 Q82 134 82 140 Z" stroke-width="1.4"/>
    <!-- Hanging notch -->
    <circle cx="100" cy="55" r="5" stroke-width="1.5"/>
    <!-- Small star doodle -->
    <path d="M148 90 L150 96 L144 92 L154 92 L148 96 Z" stroke-width="1.3"/>
  </g>
</svg>
