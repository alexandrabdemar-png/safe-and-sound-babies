<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" stroke="#2C3560" fill="none" stroke-linecap="round" stroke-linejoin="round">
  <!-- Bag main body sides -->
  <line x1="58" y1="78" x2="54" y2="168" stroke-width="2.4"/>
  <line x1="142" y1="78" x2="146" y2="168" stroke-width="2.4"/>
  <!-- Bag bottom sealed edge -->
  <path d="M 54 168 C 58 178 74 184 100 184 C 126 184 142 178 146 168" stroke-width="2.4"/>
  <!-- Bag bottom fold tuck line -->
  <path d="M 58 174 Q 100 178 142 174" stroke-width="1.3"/>

  <!-- Zip-lock seal housing top -->
  <rect x="56" y="62" width="88" height="18" rx="5" stroke-width="2.2"/>
  <!-- Zip track ridge 1 (thick, prominent) -->
  <path d="M 58 68 L 142 68" stroke-width="2.6"/>
  <!-- Zip track ridge 2 (thinner) -->
  <path d="M 58 75" stroke-width="1.6"/>
  <line x1="58" y1="75" x2="142" y2="75" stroke-width="1.6"/>

  <!-- Zip slider tab -->
  <rect x="94" y="60" width="12" height="22" rx="5" stroke-width="1.8"/>
  <!-- Slider indent line -->
  <line x1="94" y1="70" x2="106" y2="70" stroke-width="1.2"/>

  <!-- Hanging notch hole at top -->
  <circle cx="100" cy="54" r="7" stroke-width="2"/>
  <!-- Notch connecting to zip area -->
  <path d="M 93 58 L 93 62" stroke-width="1.3"/>
  <path d="M 107 58 L 107 62" stroke-width="1.3"/>

  <!-- Label area rectangle -->
  <rect x="64" y="84" width="72" height="52" rx="7" stroke-width="1.8"/>
  <!-- Label header band -->
  <rect x="64" y="84" width="72" height="14" rx="7" stroke-width="1.3"/>

  <!-- Heart on label body -->
  <path d="M 100 104 C 100 99 105 97 109 100 C 113 103 113 110 109 115 C 105 120 100 123 100 123 C 100 123 95 120 91 115 C 87 110 87 103 91 100 C 95 97 100 99 100 104 Z" stroke-width="1.6"/>

  <!-- Date line 1 -->
  <line x1="70" y1="125" x2="102" y2="125" stroke-width="1.3"/>
  <!-- Date line 2 -->
  <line x1="70" y1="131" x2="96" y2="131" stroke-width="1.2"/>

  <!-- Milk fill level wavy line -->
  <path d="M 58 144 C 68 138 78 142 88 138 C 98 134 108 140 118 136 C 128 132 138 138 146 134" stroke-width="1.8"/>
  <!-- Milk fill secondary ripple -->
  <path d="M 60 150 C 70 144 80 148 92 144 C 104 140 114 148 126 144 C 134 142 140 146 146 142" stroke-width="1.1"/>

  <!-- Milk drop 1 -->
  <path d="M 78 156 C 78 150 82 147 84 150 C 86 153 85 160 82 163 C 78 161 76 159 78 156 Z" stroke-width="1.4"/>
  <!-- Milk drop 2 -->
  <path d="M 112 158 C 112 152 116 149 118 152 C 120 155 119 162 116 165 C 112 163 110 161 112 158 Z" stroke-width="1.4"/>

  <!-- Bag left shine edge -->
  <path d="M 62 82 C 61 100 60 118 60 136" stroke-width="1.2"/>
  <!-- Bag secondary shine -->
  <path d="M 66 82 C 65 96 65 112 65 128" stroke-width="1.1"/>
</svg>
