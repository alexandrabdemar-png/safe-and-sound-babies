  <path d="M 60 118 C 76 110 122 110 138 118" stroke-width="1.4"/>
  <path d="M 58 132 C 74 124 124 124 140 132" stroke-width="1.2"/>
  <!-- Harness centre -->
  <line x1="96" y1="80" x2="96" y2="148" stroke-width="1.6"/>
  <!-- Harness shoulders -->
  <path d="M 76 80 C 80 100 86 116 96 128" stroke-width="1.5"/>
  <path d="M 122 80 C 118 100 110 116 96 128" stroke-width="1.5"/>
  <!-- Harness waist -->
  <path d="M 70 136 Q 96 144 124 136" stroke-width="1.5"/>
  <!-- Crotch buckle -->
  <rect x="84" y="128" width="22" height="14" rx="5" stroke-width="1.6"/>
  <!-- Rocker frame left leg -->
  <path d="M 60 150 C 52 162 40 172 26 178" stroke-width="2.4"/>
  <!-- Rocker frame right leg -->
  <path d="M 138 150 C 148 162 158 170 170 176" stroke-width="2.4"/>
  <!-- Rocker base sweeping arc -->
  <path d="M 18 180 C 42 164 68 156 98 154 C 128 156 158 166 182 182" stroke-width="2.8"/>
  <!-- Second rocker arc (depth) -->
  <path d="M 24 184 C 48 170 72 162 98 160 C 126 162 154 172 176 184" stroke-width="1.4"/>
  <!-- Control button side -->
  <circle cx="144" cy="112" r="7" stroke-width="1.8"/>
  <circle cx="144" cy="132" r="7" stroke-width="1.8"/>
</svg>
