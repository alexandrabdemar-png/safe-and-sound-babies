  <path d="M 56 122 C 52 100 56 78 68 64 L 112 62 C 128 64 140 78 140 96 L 140 130 C 138 148 120 158 94 158 L 70 156 C 56 150 54 140 56 122 Z" stroke-width="2.6"/>
