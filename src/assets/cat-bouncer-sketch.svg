  <path d="M 136 52 C 145 50 148 58 143 64" stroke-width="1.4"/>
  <!-- Elephant ear -->
  <path d="M 124 44 C 128 38 136 40 134 47" stroke-width="1.3"/>
  <!-- Elephant eye -->
  <circle cx="132" cy="49" r="1.5" fill="#2C3560" stroke-width="0"/>
